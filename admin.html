<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女神管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-purple-400 mb-8">女神管理后台</h1>
        
        <div class="grid grid-cols-2 gap-8">
            <!-- 角色编辑 -->
            <div class="bg-gray-900 p-6 rounded-3xl">
                <h2 class="text-2xl mb-6">角色编辑</h2>
                <input id="name" class="w-full bg-gray-800 p-4 rounded-2xl mb-4" placeholder="角色名称">
                <input id="avatar" class="w-full bg-gray-800 p-4 rounded-2xl mb-4" placeholder="头像URL">
                <button onclick="saveRole()" class="w-full bg-purple-600 py-4 rounded-2xl">保存角色</button>
            </div>
            
            <!-- 消息回复 -->
            <div class="bg-gray-900 p-6 rounded-3xl">
                <h2 class="text-2xl mb-6">实时消息回复</h2>
                <div id="admin-chat" class="h-96 overflow-auto bg-gray-950 p-4 rounded-2xl mb-4"></div>
                <input id="admin-input" class="w-full bg-gray-800 p-4 rounded-2xl" placeholder="回复消息..." onkeypress="if(event.key==='Enter') replyMsg()">
            </div>
        </div>
    </div>
</body>
</html>
