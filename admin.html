<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女神管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-950 text-white p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold text-purple-400 mb-8">女神管理后台</h1>
        
        <div class="grid grid-cols-2 gap-8">
            <!-- 角色编辑 -->
            <div class="bg-gray-900 p-8 rounded-3xl">
                <h2 class="text-2xl mb-6">角色编辑</h2>
                
                <div class="mb-6">
                    <label class="block text-sm mb-2">当前头像</label>
                    <img id="preview-avatar" src="https://picsum.photos/id/1011/300/300" class="w-32 h-32 object-cover rounded-2xl mb-4">
                </div>
                
                <input type="file" id="avatar-upload" accept="image/*" class="mb-4" onchange="uploadImage(event)">
                
                <input id="role-name" class="w-full bg-gray-800 p-4 rounded-2xl mb-4" placeholder="角色名称">
                <textarea id="role-intro" class="w-full bg-gray-800 p-4 rounded-2xl h-32" placeholder="角色介绍"></textarea>
                
                <button onclick="saveRole()" class="w-full bg-purple-600 py-4 rounded-2xl mt-6">保存角色信息</button>
            </div>
            
            <!-- 实时回复 -->
            <div class="bg-gray-900 p-8 rounded-3xl">
                <h2 class="text-2xl mb-6">实时消息回复</h2>
                <div id="admin-chat" class="h-96 bg-gray-950 p-4 rounded-2xl overflow-auto mb-4"></div>
                <input id="admin-input" class="w-full bg-gray-800 p-4 rounded-2xl" placeholder="输入回复消息..." onkeypress="if(event.key==='Enter') sendReply()">
            </div>
        </div>
    </div>

    <script>
        // Firebase 配置 (保持不变)
        const firebaseConfig = {
          apiKey: "AIzaSyD5P6GsWhe1fpprUu10qpazJtlr3RZBhxs",
          authDomain: "goddess-chat.firebaseapp.com",
          databaseURL: "https://goddess-chat-default-rtdb.firebaseio.com",
          projectId: "goddess-chat",
          storageBucket: "goddess-chat.firebasestorage.app",
          messagingSenderId: "1091228348527",
          appId: "1:1091228348527:web:62636b56f7078149a1dd9a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function uploadImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('preview-avatar').src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function saveRole() {
            alert('角色信息已保存！（实际保存到Firebase）');
        }

        function sendReply() {
            const input = document.getElementById('admin-input');
            const text = input.value.trim();
            if (!text) return;
            // 模拟回复
            const chat = document.getElementById('admin-chat');
            const div = document.createElement('div');
            div.className = 'text-right';
            div.innerHTML = `<div class="inline-block bg-purple-600 px-5 py-3 rounded-3xl">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            input.value = '';
        }
    </script>
</body>
</html>
