<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女神管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-950 text-white p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold text-purple-400 mb-8">女神管理后台</h1>
        
        <div class="flex gap-8">
            <!-- 角色选择 -->
            <div class="w-64 bg-gray-900 p-6 rounded-3xl">
                <h2 class="text-xl mb-4">选择女神</h2>
                <div onclick="selectChar(1)" class="cursor-pointer p-4 hover:bg-gray-800 rounded-2xl mb-2">A女神</div>
                <div onclick="selectChar(2)" class="cursor-pointer p-4 hover:bg-gray-800 rounded-2xl">B女神</div>
            </div>
            
            <!-- 聊天 -->
            <div class="flex-1 bg-gray-900 p-8 rounded-3xl">
                <h2 id="admin-title" class="text-2xl mb-6">A女神 - 实时回复</h2>
                <div id="admin-chat" class="h-96 bg-gray-950 p-4 rounded-2xl overflow-auto mb-4"></div>
                <input id="admin-input" class="w-full bg-gray-800 p-4 rounded-2xl" placeholder="输入回复..." onkeypress="if(event.key==='Enter') sendReply()">
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* 你的配置 */ apiKey: "AIzaSyD5P6GsWhe1fpprUu10qpazJtlr3RZBhxs", authDomain: "goddess-chat.firebaseapp.com", databaseURL: "https://goddess-chat-default-rtdb.firebaseio.com", projectId: "goddess-chat", storageBucket: "goddess-chat.firebasestorage.app", messagingSenderId: "1091228348527", appId: "1:1091228348527:web:62636b56f7078149a1dd9a" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentCharId = 1;

        function selectChar(id) {
            currentCharId = id;
            document.getElementById('admin-title').textContent = (id === 1 ? 'A女神' : 'B女神') + " - 实时回复";
            document.getElementById('admin-chat').innerHTML = '';
        }

        function sendReply() {
            const input = document.getElementById('admin-input');
            const text = input.value.trim();
            if (!text) return;
            db.ref('chats/' + currentCharId).push({ type: 'ai', text, time: Date.now() });
            input.value = '';
        }

        // 监听消息
        function listenToChat() {
            db.ref('chats/1').on('child_added', snap => addMsg(snap.val()));
            db.ref('chats/2').on('child_added', snap => addMsg(snap.val()));
        }

        function addMsg(msg) {
            const chat = document.getElementById('admin-chat');
            const div = document.createElement('div');
            div.className = msg.type === 'user' ? 'text-left' : 'text-right';
            div.innerHTML = `<div class="inline-block px-5 py-3 rounded-3xl ${msg.type === 'user' ? 'bg-pink-600' : 'bg-gray-700'} mb-2">${msg.text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        listenToChat();
    </script>
</body>
</html>
