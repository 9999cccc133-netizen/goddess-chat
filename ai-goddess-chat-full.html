<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI女神チャット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
        .message { padding: 12px 18px; border-radius: 20px; max-width: 80%; margin-bottom: 10px; }
        .user { background: #ec4899; color: white; margin-left: auto; }
        .ai { background: #374151; margin-right: auto; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen p-4">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-pink-400 text-center mb-8">AI女神チャット</h1>
        
        <div class="flex gap-6">
            <!-- 角色列表 -->
            <div class="w-64 bg-gray-900 p-4 rounded-3xl">
                <h2 class="text-pink-400 mb-4">女神選択</h2>
                <div onclick="switchChar(1)" class="cursor-pointer p-3 rounded-xl hover:bg-gray-800">A女神</div>
                <div onclick="switchChar(2)" class="cursor-pointer p-3 rounded-xl hover:bg-gray-800">B女神</div>
            </div>
            
            <!-- 聊天区 -->
            <div class="flex-1 bg-gray-900 rounded-3xl p-6">
                <div id="header" class="text-2xl font-bold mb-6 text-pink-400 text-center">A女神</div>
                
                <div id="chat" class="h-96 overflow-auto bg-gray-950 rounded-2xl p-4 mb-6"></div>
                
                <div class="flex gap-3">
                    <input id="input" class="flex-1 bg-gray-800 rounded-full px-6 py-4 focus:outline-none" placeholder="メッセージを入力..." onkeypress="if(event.key==='Enter') sendMsg()">
                    <button onclick="sendMsg()" class="bg-pink-600 px-8 rounded-full">送信</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD5P6GsWhe1fpprUu10qpazJtlr3RZBhxs",
          authDomain: "goddess-chat.firebaseapp.com",
          databaseURL: "https://goddess-chat-default-rtdb.firebaseio.com",
          projectId: "goddess-chat",
          storageBucket: "goddess-chat.firebasestorage.app",
          messagingSenderId: "1091228348527",
          appId: "1:1091228348527:web:62636b56f7078149a1dd9a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentId = 1;

        function switchChar(id) {
            currentId = id;
            document.getElementById('header').textContent = id === 1 ? 'A女神' : 'B女神';
            document.getElementById('chat').innerHTML = '';
        }

        function sendMsg() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;

            db.ref('chats/' + currentId).push({
                type: 'user',
                text: text,
                time: Date.now()
            });

            input.value = '';
        }

        // 实时监听
        db.ref('chats/1').on('child_added', snap => {
            const m = snap.val();
            addMessage(m.type, m.text);
        });
        db.ref('chats/2').on('child_added', snap => {
            const m = snap.val();
            addMessage(m.type, m.text);
        });

        function addMessage(type, text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${type === 'user' ? 'user' : 'ai'}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
