<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI女神チャット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-950 text-white">
    <div class="max-w-4xl mx-auto p-4">
        <h1 class="text-4xl font-bold text-pink-400 text-center mb-8">AI女神チャット</h1>
        
        <div class="flex gap-4">
            <!-- 角色选择 -->
            <div class="w-64 bg-gray-900 p-4 rounded-3xl">
                <h2 class="text-pink-400 mb-4">女神選択</h2>
                <div id="character-grid" class="space-y-3"></div>
            </div>
            
            <!-- 聊天 -->
            <div class="flex-1 bg-gray-900 rounded-3xl p-6">
                <div id="current-name" class="text-2xl font-bold mb-6 text-center"></div>
                <div id="chat-messages" class="h-96 overflow-auto space-y-4 mb-6"></div>
                
                <div class="flex gap-3">
                    <input id="message-input" class="flex-1 bg-gray-800 rounded-full px-6 py-4" placeholder="メッセージを入力..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="bg-pink-600 px-8 rounded-full">送信</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD5P6GsWhe1fpprUu10qpazJtlr3RZBhxs",
          authDomain: "goddess-chat.firebaseapp.com",
          databaseURL: "https://goddess-chat-default-rtdb.firebaseio.com",
          projectId: "goddess-chat",
          storageBucket: "goddess-chat.firebasestorage.app",
          messagingSenderId: "1091228348527",
          appId: "1:1091228348527:web:62636b56f7078149a1dd9a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentChar = {id:1, name:"A女神"};

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            db.ref('chats/' + currentChar.id).push({
                type: 'user',
                text: text,
                time: Date.now()
            });
            input.value = '';
        }

        // 加载消息
        function loadChat() {
            const container = document.getElementById('chat-messages');
            db.ref('chats/' + currentChar.id).on('child_added', (snap) => {
                const msg = snap.val();
                const div = document.createElement('div');
                div.className = msg.type === 'user' ? 'text-right' : 'text-left';
                div.innerHTML = `<span class="inline-block px-5 py-3 rounded-3xl ${msg.type === 'user' ? 'bg-pink-600' : 'bg-gray-700'}">${msg.text}</span>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        // 初始化
        loadChat();
    </script>
</body>
</html>
