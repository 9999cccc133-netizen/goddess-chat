<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI女神チャット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
        .chat-bg { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://picsum.photos/id/1015/1200/800'); background-size: cover; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <div class="flex h-screen">
        <!-- 左侧 - 角色选择 & 编辑 -->
        <div class="w-96 border-r border-purple-900 bg-gray-900 flex flex-col">
            <div class="p-4 border-b border-purple-900 bg-black">
                <h1 class="text-2xl font-bold text-purple-400">AI女神チャット</h1>
            </div>
            
            <div class="p-4">
                <h2 class="text-lg mb-3">女神選択</h2>
                <div id="character-grid" class="grid grid-cols-2 gap-4"></div>
            </div>
            
            <div class="p-4 border-t border-purple-900 mt-auto">
                <button onclick="toggleEdit()" class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-xl">人设编辑</button>
            </div>
        </div>

        <!-- 聊天区域 -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 bg-gray-900 border-b border-purple-900 flex items-center px-6">
                <div id="current-avatar" class="w-10 h-10 rounded-full overflow-hidden mr-3"></div>
                <div id="current-name" class="font-bold text-xl"></div>
            </div>
            
            <div id="chat-messages" class="flex-1 overflow-auto p-6 chat-bg space-y-6"></div>
            
            <div class="p-4 bg-gray-900">
                <div class="flex gap-3 max-w-3xl mx-auto">
                    <input id="message-input" onkeypress="if(event.key==='Enter') sendMessage()" 
                           class="flex-1 bg-gray-800 rounded-full px-6 py-4 focus:outline-none" placeholder="メッセージを入力...">
                    <button onclick="sendMessage()" class="bg-purple-600 px-10 rounded-full">送信</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑面板 -->
    <div id="edit-panel" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
        <div class="bg-gray-900 p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-2xl mb-6">人设编辑</h2>
            <input id="edit-name" class="w-full bg-gray-800 p-3 rounded-xl mb-4" placeholder="角色名称">
            <input id="edit-avatar" type="text" class="w-full bg-gray-800 p-3 rounded-xl mb-4" placeholder="头像URL">
            <button onclick="saveEdit()" class="w-full bg-purple-600 py-4 rounded-xl">保存</button>
            <button onclick="toggleEdit()" class="w-full mt-3 py-4">取消</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* 你的配置 */ apiKey: "AIzaSyD5P6GsWhe1fpprUu10qpazJtlr3RZBhxs", authDomain: "goddess-chat.firebaseapp.com", databaseURL: "https://goddess-chat-default-rtdb.firebaseio.com", projectId: "goddess-chat", storageBucket: "goddess-chat.firebasestorage.app", messagingSenderId: "1091228348527", appId: "1:1091228348527:web:62636b56f7078149a1dd9a" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentCharacter = {id: 1, name: "A女神", avatar: "https://picsum.photos/id/1011/200/200"};

        function renderCharacters() {
            // 简化版，实际可扩展
            const grid = document.getElementById('character-grid');
            grid.innerHTML = `
                <div onclick="switchCharacter(1)" class="cursor-pointer text-center">
                    <img src="https://picsum.photos/id/1011/200/200" class="w-full rounded-2xl">
                    <p>A女神</p>
                </div>
            `;
        }

        function switchCharacter(id) {
            currentCharacter = {id, name: "A女神", avatar: "https://picsum.photos/id/1011/200/200"};
            document.getElementById('current-avatar').innerHTML = `<img src="${currentCharacter.avatar}" class="w-full h-full object-cover">`;
            document.getElementById('current-name').textContent = currentCharacter.name;
            loadMessages();
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            db.ref('chats/' + currentCharacter.id).push({ type: 'user', text, time: Date.now() });
            input.value = '';
        }

        function loadMessages() {
            const container = document.getElementById('chat-messages');
            db.ref('chats/' + currentCharacter.id).on('child_added', (snap) => {
                const msg = snap.val();
                const div = document.createElement('div');
                div.className = msg.type === 'user' ? 'flex justify-end' : 'flex justify-start';
                div.innerHTML = `<div class="max-w-xs px-5 py-3 rounded-3xl ${msg.type === 'user' ? 'bg-purple-600' : 'bg-gray-700'}">${msg.text}</div>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        function toggleEdit() {
            document.getElementById('edit-panel').classList.toggle('hidden');
        }

        function saveEdit() {
            // 保存逻辑
            toggleEdit();
            alert('人设已保存');
        }

        // 初始化
        renderCharacters();
        switchCharacter(1);
    </script>
</body>
</html>
