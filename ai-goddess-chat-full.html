<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI女神チャット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
        .chat-bg { background: linear-gradient(rgba(0,0,0,0.85), rgba(236,72,153,0.3)), url('https://picsum.photos/id/1015/1200/800'); background-size: cover; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen overflow-hidden">
    <div class="flex h-screen">
        <!-- 左侧角色 -->
        <div class="w-80 bg-gray-900 border-r border-pink-800 p-4 overflow-auto">
            <h1 class="text-3xl font-bold text-pink-400 mb-8 text-center">女神チャット</h1>
            <div id="character-grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- 聊天主界面 -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 bg-gray-900 border-b border-pink-800 flex items-center px-6 justify-between">
                <div class="flex items-center gap-4">
                    <div id="current-avatar" class="w-11 h-11 rounded-2xl overflow-hidden"></div>
                    <div>
                        <div id="current-name" class="text-xl font-bold"></div>
                        <div class="text-green-400 text-sm">● オンライン</div>
                    </div>
                </div>
                <button onclick="window.location.reload()" class="text-pink-400 hover:text-pink-300">
                    <i class="fas fa-redo"></i>
                </button>
            </div>

            <div id="chat-messages" class="flex-1 overflow-auto p-6 chat-bg space-y-6"></div>

            <div class="p-5 bg-gray-900 border-t border-pink-800">
                <div class="max-w-3xl mx-auto flex gap-3">
                    <input id="message-input" 
                           onkeypress="if(event.key==='Enter') sendMessage()"
                           type="text" 
                           class="flex-1 bg-gray-800 rounded-full px-6 py-4 focus:outline-none text-lg"
                           placeholder="メッセージを入力してください... 💕">
                    <button onclick="sendMessage()" 
                            class="bg-pink-600 hover:bg-pink-700 px-10 rounded-full font-medium">
                        送信
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD5P6GsWhe1fpprUu10qpazJtlr3RZBhxs",
          authDomain: "goddess-chat.firebaseapp.com",
          databaseURL: "https://goddess-chat-default-rtdb.firebaseio.com",
          projectId: "goddess-chat",
          storageBucket: "goddess-chat.firebasestorage.app",
          messagingSenderId: "1091228348527",
          appId: "1:1091228348527:web:62636b56f7078149a1dd9a",
          measurementId: "G-VH4XCJPWVM"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentCharacter = { id: 1, name: "A女神", avatar: "https://picsum.photos/id/1011/200/200" };

        // 简单角色
        const characters = [
            {id:1, name:"A女神", avatar:"https://picsum.photos/id/1011/200/200"},
            {id:2, name:"B女神", avatar:"https://picsum.photos/id/64/200/200"},
        ];

        function renderCharacters() {
            const grid = document.getElementById('character-grid');
            grid.innerHTML = '';
            characters.forEach(char => {
                const div = document.createElement('div');
                div.className = 'cursor-pointer rounded-2xl overflow-hidden border-2 border-transparent hover:border-pink-500';
                div.innerHTML = `<img src="${char.avatar}" class="w-full aspect-square object-cover"><div class="text-center py-2 bg-black/50">${char.name}</div>`;
                div.onclick = () => switchCharacter(char);
                grid.appendChild(div);
            });
        }

        function switchCharacter(char) {
            currentCharacter = char;
            document.getElementById('current-avatar').innerHTML = `<img src="${char.avatar}" class="w-full h-full object-cover">`;
            document.getElementById('current-name').textContent = char.name;
            loadMessages();
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            const ref = db.ref('chats/' + currentCharacter.id);
            ref.push({
                type: 'user',
                text: text,
                timestamp: Date.now()
            });

            input.value = '';
        }

        function loadMessages() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            const ref = db.ref('chats/' + currentCharacter.id);
            
            ref.on('child_added', (snapshot) => {
                const msg = snapshot.val();
                const div = document.createElement('div');
                div.className = msg.type === 'user' ? 'flex justify-end' : 'flex justify-start';
                div.innerHTML = `
                    <div class="${msg.type === 'user' ? 'bg-pink-600' : 'bg-gray-700'} rounded-3xl px-5 py-3 max-w-[70%]">
                        ${msg.text}
                    </div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        // 初始化
        renderCharacters();
        switchCharacter(characters[0]);
    </script>
</body>
</html>
