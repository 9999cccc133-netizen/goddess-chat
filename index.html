<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI女神チャット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <div class="flex h-screen">
        <!-- 左侧角色 -->
        <div class="w-80 bg-gray-900 border-r border-purple-900 p-4 overflow-auto">
            <h1 class="text-3xl font-bold text-purple-400 mb-8 text-center">AI女神チャット</h1>
            <div id="character-grid" class="grid grid-cols-2 gap-4"></div>
        </div>
        
        <!-- 聊天区 -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 bg-gray-900 border-b border-purple-900 flex items-center px-6">
                <div id="current-avatar" class="w-10 h-10 rounded-2xl overflow-hidden"></div>
                <div class="ml-4">
                    <div id="current-name" class="font-bold text-xl"></div>
                </div>
            </div>
            <div id="chat-messages" class="flex-1 p-6 overflow-auto bg-gray-950"></div>
            <div class="p-4 bg-gray-900 border-t border-purple-900">
                <input id="message-input" class="w-full bg-gray-800 rounded-full px-6 py-4" placeholder="メッセージを入力..." onkeypress="if(event.key==='Enter') sendMessage()">
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD5P6GsWhe1fpprUu10qpazJtlr3RZBhxs",
          authDomain: "goddess-chat.firebaseapp.com",
          databaseURL: "https://goddess-chat-default-rtdb.firebaseio.com",
          projectId: "goddess-chat",
          storageBucket: "goddess-chat.firebasestorage.app",
          messagingSenderId: "1091228348527",
          appId: "1:1091228348527:web:62636b56f7078149a1dd9a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentCharacter = {id:1, name:"A女神", avatar:"https://picsum.photos/id/1011/300/300"};

        function renderCharacters() {
            const grid = document.getElementById('character-grid');
            grid.innerHTML = '';
            // 从Firebase读取（简化版）
            const chars = [
                {id:1, name:"A女神", avatar:"https://picsum.photos/id/1011/300/300"},
                {id:2, name:"B女神", avatar:"https://picsum.photos/id/64/300/300"}
            ];
            chars.forEach(char => {
                const div = document.createElement('div');
                div.className = 'cursor-pointer rounded-3xl overflow-hidden border-2 border-transparent hover:border-purple-500';
                div.innerHTML = `<img src="${char.avatar}" class="w-full aspect-square object-cover"><div class="text-center p-2 bg-black/50">${char.name}</div>`;
                div.onclick = () => switchCharacter(char);
                grid.appendChild(div);
            });
        }

        function switchCharacter(char) {
            currentCharacter = char;
            document.getElementById('current-avatar').innerHTML = `<img src="${char.avatar}" class="w-full h-full object-cover">`;
            document.getElementById('current-name').textContent = char.name;
            document.getElementById('chat-messages').innerHTML = `<div class="text-center text-purple-300 mt-20">ようこそ、${char.name} 💖</div>`;
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;
            const chat = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'flex justify-end mb-4';
            div.innerHTML = `<div class="bg-purple-600 px-5 py-3 rounded-3xl">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            input.value = '';
        }

        renderCharacters();
        switchCharacter({id:1, name:"A女神", avatar:"https://picsum.photos/id/1011/300/300"});
    </script>
</body>
</html>
