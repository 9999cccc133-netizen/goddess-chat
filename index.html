<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI女神チャット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
        .chat-bg { background: linear-gradient(rgba(0,0,0,0.85), rgba(168, 85, 247, 0.4)), url('https://picsum.photos/id/1015/1200/800'); background-size: cover; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <div class="flex h-screen">
        <!-- 左侧角色选择 -->
        <div class="w-80 bg-gray-900 border-r border-purple-900 p-4 overflow-auto">
            <h1 class="text-3xl font-bold text-purple-400 mb-8 text-center">AI女神チャット</h1>
            <div id="character-grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- 聊天主界面 -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 bg-gray-900 border-b border-purple-900 flex items-center px-6">
                <div id="current-avatar" class="w-11 h-11 rounded-2xl overflow-hidden ring-2 ring-purple-500"></div>
                <div class="ml-4">
                    <div id="current-name" class="font-bold text-xl"></div>
                    <div class="text-green-400 text-sm">● オンライン</div>
                </div>
            </div>
            <div id="chat-messages" class="flex-1 overflow-auto p-6 chat-bg space-y-6"></div>
            <div class="p-4 bg-gray-900 border-t border-purple-900">
                <div class="max-w-3xl mx-auto flex gap-3">
                    <input id="message-input" class="flex-1 bg-gray-800 rounded-full px-6 py-4 focus:outline-none" placeholder="メッセージを入力してください... 💕" onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="bg-purple-600 px-10 rounded-full font-medium">送信</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentCharacter = {id: 1, name: "A女神", avatar: "https://picsum.photos/id/1011/300/300"};
        
        const characters = [
            {id:1, name:"A女神", avatar:"https://picsum.photos/id/1011/300/300"},
            {id:2, name:"B女神", avatar:"https://picsum.photos/id/64/300/300"},
        ];

        function renderCharacters() {
            const grid = document.getElementById('character-grid');
            grid.innerHTML = '';
            characters.forEach(char => {
                const div = document.createElement('div');
                div.className = 'cursor-pointer rounded-3xl overflow-hidden border border-transparent hover:border-purple-500';
                div.innerHTML = `<img src="${char.avatar}" class="w-full aspect-square object-cover"><div class="text-center p-2 bg-black/50">${char.name}</div>`;
                div.onclick = () => switchCharacter(char);
                grid.appendChild(div);
            });
        }

        function switchCharacter(char) {
            currentCharacter = char;
            document.getElementById('current-avatar').innerHTML = `<img src="${char.avatar}" class="w-full h-full object-cover">`;
            document.getElementById('current-name').textContent = char.name;
            document.getElementById('chat-messages').innerHTML = `<div class="text-center text-purple-300 mt-20">ようこそ、${char.name}とのチャットへ 💖</div>`;
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;
            const chat = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'flex justify-end';
            div.innerHTML = `<div class="bg-purple-600 text-white px-5 py-3 rounded-3xl max-w-xs">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            input.value = '';
            
            // 模拟女神回复
            setTimeout(() => {
                const replyDiv = document.createElement('div');
                replyDiv.className = 'flex justify-start';
                replyDiv.innerHTML = `<div class="bg-gray-700 px-5 py-3 rounded-3xl max-w-xs">うんうん～💕 もっと聞かせて？</div>`;
                chat.appendChild(replyDiv);
                chat.scrollTop = chat.scrollHeight;
            }, 800);
        }

        renderCharacters();
        switchCharacter(characters[0]);
    </script>
</body>
</html>
